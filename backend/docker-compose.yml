version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rakshita_user
      POSTGRES_PASSWORD: rakshita_pass
      POSTGRES_DB: rakshita_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ── FastAPI Backend ─────────────────────────────────────
  web:
    build: .
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://rakshita_user:rakshita_pass@db:5432/rakshita_db
      JWT_SECRET_KEY: CHANGE-ME-IN-PRODUCTION
    depends_on:
      - db
    volumes:
      - .:/app
    working_dir: /app

volumes:
  pgdata:
